name: Semantic View CI - Evaluate on PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'instance/semantic_views/**'
      - 'instance/question_banks/semantic_view/**'
      - 'evaluation/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  audit-semantic-view:
    name: "Audit: Best Practices"
    runs-on: ubuntu-latest
    outputs:
      audit_passed: ${{ steps.audit.outputs.passed }}
    env:
      DEFAULT_INSTANCE: instance

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve active instance from changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=100 origin "${{ github.base_ref }}"
            CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then BEFORE="HEAD~1"; fi
            CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          fi
          echo "Changed files:"; echo "$CHANGED"
          INSTANCES=$(echo "$CHANGED" | grep -oE '^instance/(semantic_views|question_banks/semantic_view)/' | sed -E 's#/(semantic_views|question_banks)/.*##' | sort -u)
          COUNT=$(printf '%s\n' "$INSTANCES" | grep -c . || true)
          if [ "$COUNT" -eq 0 ]; then
            INSTANCE="${DEFAULT_INSTANCE}"
            echo "No example-specific change detected (e.g. framework/eval code); using DEFAULT_INSTANCE=$INSTANCE"
          else
            if [ "$COUNT" -gt 1 ]; then echo "WARNING: multiple instances changed; using the first:"; echo "$INSTANCES"; fi
            INSTANCE=$(printf '%s\n' "$INSTANCES" | head -1)
          fi
          echo "AIOPS_INSTANCE=$INSTANCE" >> "$GITHUB_ENV"
          echo "Resolved AIOPS_INSTANCE=$INSTANCE"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run semantic view best practices audit
        id: audit
        run: |
          set +e
          python evaluation/audit_semantic_view.py \
            --output sv_audit_report.json
          EXIT_CODE=$?
          echo "passed=$([ $EXIT_CODE -eq 0 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          exit 0

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sv-audit-report
          path: sv_audit_report.json

  evaluate-semantic-view:
    name: "Evaluate: Question Banks"
    needs: [audit-semantic-view]
    runs-on: ubuntu-latest
    env:
      DEFAULT_INSTANCE: instance
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
      SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve active instance from changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=100 origin "${{ github.base_ref }}"
            CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then BEFORE="HEAD~1"; fi
            CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          fi
          echo "Changed files:"; echo "$CHANGED"
          INSTANCES=$(echo "$CHANGED" | grep -oE '^instance/(semantic_views|question_banks/semantic_view)/' | sed -E 's#/(semantic_views|question_banks)/.*##' | sort -u)
          COUNT=$(printf '%s\n' "$INSTANCES" | grep -c . || true)
          if [ "$COUNT" -eq 0 ]; then
            INSTANCE="${DEFAULT_INSTANCE}"
            echo "No example-specific change detected (e.g. framework/eval code); using DEFAULT_INSTANCE=$INSTANCE"
          else
            if [ "$COUNT" -gt 1 ]; then echo "WARNING: multiple instances changed; using the first:"; echo "$INSTANCES"; fi
            INSTANCE=$(printf '%s\n' "$INSTANCES" | head -1)
          fi
          echo "AIOPS_INSTANCE=$INSTANCE" >> "$GITHUB_ENV"
          echo "Resolved AIOPS_INSTANCE=$INSTANCE"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Deploy semantic view to DEV
        run: python setup/deploy.py --target semantic_view --environment dev

      - name: Run question bank evaluation
        run: |
          python evaluation/evaluate_semantic_view.py \
            --environment dev \
            --categories easy,hard,ambiguous \
            --git-sha ${{ github.sha }} \
            --git-branch ${{ github.head_ref }} \
            --output eval_results.json

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-view-eval-results
          path: eval_results.json

      - name: Download audit report
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: sv-audit-report
          path: .

      - name: Comment PR with combined results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let evalResults, auditReport;
            try {
              evalResults = JSON.parse(fs.readFileSync('eval_results.json', 'utf8'));
            } catch (e) {
              evalResults = { summary: { accuracy_pct: 0, passed_threshold: false, total_questions: 0, run_details: {} } };
            }
            try {
              auditReport = JSON.parse(fs.readFileSync('sv_audit_report.json', 'utf8'));
            } catch (e) {
              auditReport = { summary: { total_findings: 'N/A', audit_passed: 'N/A', by_severity: {} } };
            }

            const s = evalResults.summary;
            const a = auditReport.summary;
            const evalStatus = s.passed_threshold ? '✅ PASSED' : '❌ FAILED';
            const auditStatus = a.audit_passed ? '✅ PASSED' : '⚠️ ISSUES FOUND';

            const categories = s.run_details?.by_category || {};
            let catTable = '';
            for (const [cat, stats] of Object.entries(categories)) {
              catTable += `| ${cat} | ${stats.passed}/${stats.total} | ${stats.accuracy_pct}% |\n`;
            }

            const severities = a.by_severity || {};
            let sevTable = '';
            for (const [sev, count] of Object.entries(severities)) {
              sevTable += `| ${sev} | ${count} |\n`;
            }

            const body = `## Semantic View CI Results

            ### 1. Best Practices Audit ${auditStatus}
            | Metric | Value |
            |--------|-------|
            | **Total Findings** | ${a.total_findings} |
            | **Blocking Issues** | ${a.has_blocking_issues ? 'Yes' : 'No'} |

            ${sevTable ? `| Severity | Count |\n|----------|-------|\n${sevTable}` : ''}

            ### 2. Question Bank Evaluation ${evalStatus}
            | Metric | Value |
            |--------|-------|
            | **Accuracy** | ${s.accuracy_pct}% |
            | **Threshold** | ${s.threshold_pct}% |
            | **Passed** | ${s.passed_questions}/${s.total_questions} |

            | Category | Passed | Accuracy |
            |----------|--------|----------|
            ${catTable}

            > Commit: \`${s.git_commit_sha?.slice(0,7)}\` | Branch: \`${s.git_branch}\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
