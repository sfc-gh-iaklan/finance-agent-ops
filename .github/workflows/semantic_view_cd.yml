name: Semantic View CD - Promote to PROD

on:
  push:
    branches: [main]
    paths:
      - 'instance/semantic_views/**'

jobs:
  audit-and-promote:
    runs-on: ubuntu-latest
    env:
      DEFAULT_INSTANCE: instance
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
      SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve active instance from changed files
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then BEFORE="HEAD~1"; fi
          CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          echo "Changed files:"; echo "$CHANGED"
          INSTANCES=$(echo "$CHANGED" | grep -oE '^instance/semantic_views/' | sed -E 's#/semantic_views/.*##' | sort -u)
          COUNT=$(printf '%s\n' "$INSTANCES" | grep -c . || true)
          if [ "$COUNT" -eq 0 ]; then
            INSTANCE="${DEFAULT_INSTANCE}"
            echo "No example semantic-view change detected; using DEFAULT_INSTANCE=$INSTANCE"
          else
            if [ "$COUNT" -gt 1 ]; then echo "WARNING: multiple instances changed; using the first:"; echo "$INSTANCES"; fi
            INSTANCE=$(printf '%s\n' "$INSTANCES" | head -1)
          fi
          echo "AIOPS_INSTANCE=$INSTANCE" >> "$GITHUB_ENV"
          echo "Resolved AIOPS_INSTANCE=$INSTANCE"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run best practices audit (gate)
        run: |
          python evaluation/audit_semantic_view.py \
            --output sv_audit_report.json

      - name: Run final evaluation on DEV
        run: |
          python evaluation/evaluate_semantic_view.py \
            --environment dev \
            --categories easy,hard,ambiguous \
            --git-sha ${{ github.sha }} \
            --git-branch main \
            --output eval_results.json

      - name: Check evaluation passed
        run: |
          python -c "
          import json, sys
          with open('eval_results.json') as f:
              results = json.load(f)
          if not results.get('passed_threshold'):
              print(f'FAILED: Accuracy {results[\"summary\"][\"accuracy_pct\"]}% below threshold {results[\"summary\"][\"threshold_pct\"]}%')
              sys.exit(1)
          print(f'PASSED: Accuracy {results[\"summary\"][\"accuracy_pct\"]}% meets threshold {results[\"summary\"][\"threshold_pct\"]}%')
          "

      - name: Deploy semantic view to PROD
        run: python setup/deploy.py --target semantic_view --environment prod

      - name: Ensure PROD smoke-test task exists
        run: |
          python -c "
          import os, sys
          sys.path.insert(0, 'evaluation')
          from utils import get_connection, load_config
          cfg = load_config()
          ev = cfg['eval']
          db_eval = ev['database']
          mon = ev['monitoring_schema']
          wh = ev['warehouse']
          conn = get_connection()
          cur = conn.cursor()
          # Create task only if it does not already exist
          cur.execute(f'''
              CREATE TASK IF NOT EXISTS {db_eval}.{mon}.TASK_WEEKLY_SV_EVAL
              WAREHOUSE = {wh}
              SCHEDULE = 'USING CRON 0 4 * * 0 UTC'
              AS CALL {db_eval}.{mon}.SP_WEEKLY_SV_EVAL()
          ''')
          cur.execute(f'ALTER TASK IF EXISTS {db_eval}.{mon}.TASK_WEEKLY_SV_EVAL RESUME')
          print('PROD smoke-test task TASK_WEEKLY_SV_EVAL ensured.')
          conn.close()
          "

      - name: Upload results artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-promotion-results
          path: |
            eval_results.json
            sv_audit_report.json
