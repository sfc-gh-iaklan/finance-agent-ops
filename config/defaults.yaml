# Framework defaults — UNIVERSAL config shared by every instance/example.
#
# These values are merged UNDER the active instance config
# (<instance>/config/environments.yaml) by evaluation/utils.load_config().
# Instance values always win, so an instance MAY override anything here
# (e.g. pin a different judge model) but normally does not need to.
#
# Keep this file domain-agnostic: no database, role, schema, or example-specific
# names belong here. Those live in the instance config.

# LLM model selection for evaluation + judging (Cortex model names).
llm:
  model: claude-opus-4-7
  judge_model: claude-opus-4-7
  analyst_model: default

# Token-count assumptions for PRE-FLIGHT cost estimation (see docs/reference/cost-model.md).
# AGENT values are MEASURED medians from real eval runs (see `sample`); JUDGE values are
# estimates (judge tokens are not exposed in observability and cannot be measured today).
# Token counts depend heavily on your semantic model size, tools, and step count, so treat
# these as the bundled retail example's profile and prefer your own measured actuals.
token_assumptions:
  sample: "n=3345 agent questions, OBSERVABILITY.AGENT_TRACES, 2026-04-29..2026-06-04"
  agent_input_tokens: 195000          # measured median total input per question (incl. cache reads)
  agent_cache_read_tokens: 116000     # measured median; ~85% of input is served from prompt cache
  agent_output_tokens: 410            # measured median output per question
  judge_input_tokens: 1200            # ESTIMATE (unmeasured), per metric per question
  judge_output_tokens: 300            # ESTIMATE (unmeasured), per metric per question

