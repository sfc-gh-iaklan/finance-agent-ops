questions:
  - question: "How many customers do we have?"
    expected_behavior: "Returns count of all customers from the CUSTOMERS table"
    difficulty: easy
    tags: [customers, count, single-table]

  - question: "What is the total balance across all accounts?"
    expected_behavior: "Returns SUM(BALANCE) from the ACCOUNTS table"
    difficulty: easy
    tags: [accounts, balance, aggregation]

  - question: "List all distinct customer segments"
    expected_behavior: "Returns distinct values of CUSTOMER_SEGMENT from CUSTOMERS"
    difficulty: easy
    tags: [customers, segments, distinct]

  - question: "How many accounts are currently open?"
    expected_behavior: "Returns count of accounts WHERE ACCOUNT_STATUS = 'Open'"
    difficulty: easy
    tags: [accounts, status, filter]

  - question: "What are the different account types?"
    expected_behavior: "Returns distinct ACCOUNT_TYPE values from ACCOUNTS"
    difficulty: easy
    tags: [accounts, types, distinct]

  - question: "How many transactions were flagged?"
    expected_behavior: "Returns count of transactions WHERE IS_FLAGGED = TRUE"
    difficulty: easy
    tags: [transactions, flagged, filter]

  - question: "What is the average credit score of our customers?"
    expected_behavior: "Returns AVG(CREDIT_SCORE) from CUSTOMERS"
    difficulty: easy
    tags: [customers, credit-score, aggregation]

  - question: "How many portfolios do we manage?"
    expected_behavior: "Returns count of all portfolios from PORTFOLIOS table"
    difficulty: easy
    tags: [portfolios, count, single-table]

  - question: "What is the total value of all portfolios?"
    expected_behavior: "Returns SUM(TOTAL_VALUE) from PORTFOLIOS"
    difficulty: easy
    tags: [portfolios, value, aggregation]

  - question: "How many risk assessments have a Critical risk level?"
    expected_behavior: "Returns count of risk assessments WHERE RISK_LEVEL = 'Critical'"
    difficulty: easy
    tags: [risk, critical, filter]
